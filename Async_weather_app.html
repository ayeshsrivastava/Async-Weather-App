<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Async Weather App</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#b71921;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:white;
}

.main{
    display:flex;
    gap:20px;
    margin-top:20px;
}

.left-container, .right-container{
    background:white;
    padding:20px;
    border-radius:10px;
    width:50%;
    border:2px solid #ddd; /* added border */
}

button{
    background:#d7b109;
    border:none;
    color:white;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
    border:1px solid #ccc; /* slight border */
}

button:hover{
    background:#e65a2b;
}

input{
    padding:8px;
    width:70%;
    border-radius:5px;
    border:1px solid #aaa;
    outline:none;
}

input:focus{
    border:1px solid #ff6b35;
}

#Search-history button{
    margin:5px;
}

.card{
    background:#f2f2f2;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
    border:1px solid #ccc; /* added border */
}

#console{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
    height:150px;
    overflow-y:auto;
    font-family:monospace;
    border:2px solid #ddd; /* added border */
}

h3{
    margin-top:0;
    border-bottom:1px solid #eee; /* subtle heading line */
    padding-bottom:5px;
}

</style>

</head>

<body>

<h1>Async Weather Tracker</h1>

<div class="main">

<div class="left-container">

<h3>Search City</h3>

<form>
<input placeholder="Enter city name for there weather information!!!!!" type="text" id="city">
<button type="submit">Search</button>
</form>

<h3>Search History</h3>

<div id="Search-history"></div>

</div>

<div class="right-container">

<h3>Weather Info</h3>

<div id="weather-data"></div>

</div>

</div>

<h3 style="color:white;">Console</h3>
<div id="console"></div>

<script>

let API_KEY = "1a761d3bb408836cd1af3641ce1604c9";

let form = document.querySelector("form");
let cityInput = document.getElementById("city");
let weatherDiv = document.getElementById("weather-data");
let historyDiv = document.getElementById("Search-history");
let consoleDiv = document.getElementById("console");

let history = [];
let count = 0;

function log(msg){
    count++;
    consoleDiv.innerHTML += count + ". " + msg + "<br>";
    consoleDiv.scrollTop = consoleDiv.scrollHeight;
}

async function fetchWeather(city){

    log("Sync Start");
    log("Sync End");

    try{

        log("Start fetching");

        let response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`);

        Promise.resolve().then(()=>{
            log("Promise.then (Microtask)");
        });

        setTimeout(()=>{
            log("setTimeout (Macrotask)");
        },0);

        if(!response.ok){
            throw new Error("City not found");
        }

        let data = await response.json();

        log("Data received");

        displayWeather(data);

        addToHistory(city,data);

    }
    catch(error){

        weatherDiv.innerHTML = `<p style="color:red;">${error.message}</p>`;

    }

}

function displayWeather(data){

    let card = document.createElement("div");

    card.className="card";

    card.innerHTML = `
        <h4>City: ${data.name}</h4>
        <h4>Temperature: ${data.main.temp} °C</h4>
        <h4>Humidity: ${data.main.humidity}%</h4>
        <h4>Wind Speed: ${data.wind.speed} m/s</h4>
    `;

    weatherDiv.innerHTML="";

    weatherDiv.appendChild(card);

}

function addToHistory(city,data){

    if(history.some(item => item.city === city.toLowerCase())){
        return;
    }

    history.push({
        city: city.toLowerCase(),
        data:data
    });

    renderHistory();

}

function renderHistory(){

    historyDiv.innerHTML="";

    history.forEach(item => {

        let btn=document.createElement("button");

        btn.textContent=item.city;

        btn.onclick=()=>{
            displayWeather(item.data);
        };

        historyDiv.appendChild(btn);

    });

}

form.addEventListener("submit",(e)=>{

    e.preventDefault();

    let city=cityInput.value.trim();

    if(city){

        count = 0;
        consoleDiv.innerHTML = "";

        fetchWeather(city);

        cityInput.value="";

    }

});

</script>

</body>

</html>
